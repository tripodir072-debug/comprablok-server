<script>
    function cargarInterfaz() {
        // 1. Identificamos los elementos
        const contenedor = document.getElementById('contenedor-botones');
        const badge = document.getElementById('badge-estado');
        const instruccion = document.getElementById('texto-instruccion');

        // Si el HTML todavía no cargó los divs, esperamos 100ms
        if (!contenedor || !badge || !instruccion) {
            setTimeout(cargarInterfaz, 100);
            return;
        }

        // 2. Leemos la validación (limpiamos el valor por las dudas)
        const checkValidado = localStorage.getItem('dni_verificado');
        
        contenedor.innerHTML = ""; // Limpiamos pantalla

        if (checkValidado === 'true') {
            // --- PANTALLA USUARIO VERIFICADO ---
            const nuevoID = "TR-" + Math.floor(100000 + Math.random() * 900000);
            
            badge.style.background = "#e7f3ff";
            badge.style.color = "#1877f2";
            badge.innerText = "🛡️ IDENTIDAD VERIFICADA";
            instruccion.innerHTML = "Tu identidad está protegida. Ya podés generar links de cobro seguro.";
            
            contenedor.innerHTML = `
                <button onclick="nuevoTrato('${nuevoID}')" class="menu-btn btn-vender">🤝 INICIAR TRATO SEGURO</button>
                <button onclick="solicitarCobro()" class="menu-btn btn-cobrar">💰 SOY VENDEDOR: COBRAR MI VENTA</button>
            `;
        } else {
            // --- PANTALLA BLOQUEADA (BOTÓN ROJO) ---
            badge.style.background = "#ffebe9";
            badge.style.color = "#d93025";
            badge.innerText = "⚠️ VALIDACIÓN PENDIENTE";
            instruccion.innerHTML = "<strong>Acceso restringido:</strong> Por seguridad de RICHARD BRO, primero debés validar tu identidad.";
            
            contenedor.innerHTML = `
                <button onclick="window.location.href='/registro.html'" class="menu-btn btn-validar">VALIDAR MI IDENTIDAD (DNI)</button>
            `;
        }
    }

    function nuevoTrato(id) {
        localStorage.setItem('ultimo_id_generado', id);
        window.location.href = "/vender.html?trato_id=" + id;
    }

    function solicitarCobro() {
        const idVenta = prompt("Ingresá el ID de la operación:");
        if (idVenta) {
            window.location.href = "https://wa.me/543456528480?text=Hola Richard! Quiero cobrar la venta ID: " + idVenta;
        }
    }

    // Disparamos la función apenas cargue la página
    document.addEventListener("DOMContentLoaded", cargarInterfaz);
</script>
