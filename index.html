<script>
    function cargarInterfaz() {
        // 1. Buscamos la validación
        const estaValidado = localStorage.getItem('dni_verificado');
        const contenedor = document.getElementById('contenedor-botones');
        const badge = document.getElementById('badge-estado');
        const instruccion = document.getElementById('texto-instruccion');

        // Limpiamos el contenedor para que no quede nada de sesiones viejas
        contenedor.innerHTML = "";

        if (estaValidado === 'true') {
            // PANTALLA 2: TODO VERIFICADO (Como la imagen 9143)
            const nuevoID = "TR-" + Math.floor(100000 + Math.random() * 900000);
            
            badge.className = "status-badge"; // Estilo azul por defecto
            badge.style.background = "#e7f3ff";
            badge.style.color = "#1877f2";
            badge.innerText = "🛡️ IDENTIDAD VERIFICADA";
            instruccion.innerHTML = "El dinero de tu compra queda protegido en nuestro sistema hasta que recibas el producto.";
            
            // Inyectamos ambos botones solo aquí
            contenedor.innerHTML = `
                <button onclick="nuevoTrato('${nuevoID}')" class="menu-btn btn-vender">🤝 INICIAR TRATO SEGURO</button>
                <button onclick="solicitarCobro()" class="menu-btn btn-cobrar">💰 SOY VENDEDOR: COBRAR MI VENTA</button>
            `;
        } else {
            // PANTALLA 1: BLOQUEO TOTAL (Como la imagen 8973)
            badge.className = "status-badge";
            badge.style.background = "#ffebe9";
            badge.style.color = "#d93025";
            badge.innerText = "⚠️ VALIDACIÓN PENDIENTE";
            instruccion.innerHTML = "<strong>Acceso restringido:</strong> Por seguridad, primero debes validar tu identidad con tu DNI.";
            
            // Solo mostramos el botón rojo de validar
            contenedor.innerHTML = `<button onclick="window.location.href='/registro.html'" class="menu-btn btn-validar">VALIDAR MI IDENTIDAD (DNI)</button>`;
        }
    }

    function nuevoTrato(id) {
        alert("✅ ID DE TRATO GENERADO: " + id + "\n\nGuardá este número para que el vendedor pueda cobrar.");
        localStorage.setItem('ultimo_id_generado', id);
        window.location.href = `/vender.html?trato_id=${id}`;
    }

    function solicitarCobro() {
        const idVenta = prompt("Ingrese el ID de la operación (Ej: TR-123456):");
        if (idVenta) {
            const miTel = "543456528480";
            const msg = `Hola Richard! Soy vendedor. Solicito cobrar mi venta ID: ${idVenta}. Adjunto DNI y CBU.`;
            window.location.href = `https://wa.me/${miTel}?text=${encodeURIComponent(msg)}`;
        }
    }

    window.onload = cargarInterfaz;
</script>
