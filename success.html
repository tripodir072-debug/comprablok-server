<script>
    // --- CAPTURA DEL ID REAL ---
    const params = new URLSearchParams(window.location.search);
    
    // 1. Buscamos el ID que viene de Mercado Pago (external_reference) 
    // 2. Si no está, usamos el del sistema local
    const idTratoReal = params.get('external_reference') || localStorage.getItem('ultimo_id_generado') || "TR-PENDIENTE";
    
    document.getElementById('id-pago').innerText = "OPERACIÓN: " + idTratoReal;

    const miTel = "543456528480";

    // MENSAJES PERSONALIZADOS
    const msgComprador = `ORDEN DE LIBERACIÓN 🔓\nID: ${idTratoReal}\n---\nHola Richard! Ya recibí el producto conforme. Autorizo la liberación del pago al vendedor.`;
    const msgVendedor = `SOLICITUD DE COBRO VENDEDOR 💰\nID: ${idTratoReal}\n---\nHola Richard! Entregué el producto. Adjunto mi DNI y CBU para recibir los fondos.`;

    const linkComprador = `https://wa.me/${miTel}?text=${encodeURIComponent(msgComprador)}`;
    const linkVendedor = `https://wa.me/${miTel}?text=${encodeURIComponent(msgVendedor)}`;

    // LÓGICA DE BOTONES: Si venimos de un pago exitoso, el usuario suele ser el comprador
    let htmlFinal = `
        <a href="${linkComprador}" class="btn-whatsapp btn-comprador">
            SOY EL COMPRADOR: YA RECIBÍ ✅
        </a>
    `;

    // Solo mostramos el botón de vendedor como una opción secundaria o si es necesario
    htmlFinal += `
        <p style="font-size: 12px; color: #606770; margin-top: 15px;">¿Sos el vendedor?</p>
        <a href="${linkVendedor}" style="color: var(--fb-blue); text-decoration: none; font-size: 13px; font-weight: bold;">
            Solicitar cobro de esta operación 💵
        </a>
    `;

    document.getElementById('contenedor-botones').innerHTML = htmlFinal;
</script>
