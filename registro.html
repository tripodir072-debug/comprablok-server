<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICHARDBRO - Verificación</title>
    <style>
        body { font-family: sans-serif; background: #0b0e11; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1e2329; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #474d57; }
        h2 { color: #f0b90b; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #474d57; border-radius: 8px; background: #2b3139; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #f0b90b; color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .dni-box { border: 2px dashed #f0b90b; padding: 20px; margin: 15px 0; border-radius: 8px; color: #f0b90b; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2>🛡️ Verificación DNI</h2>
    <p>Cargá tus datos para operar de forma segura.</p>
    
    <input type="text" id="nombre" placeholder="Nombre y Apellido">
    <input type="number" id="dni" placeholder="Número de DNI">
    
    <div class="dni-box" onclick="alert('Cámara activada para DNI')">
        📸 Subir Foto de DNI (Frente)
    </div>

    <button onclick="enviarRegistro()">VALIDAR IDENTIDAD</button>
    <br><br>
    <a href="/" style="color: #848e9c; text-decoration: none; font-size: 14px;">← Volver al inicio</a>
</div>

<script>
    function enviarRegistro() {
        const nombre = document.getElementById('nombre').value;
        const dni = document.getElementById('dni').value;
        if(!nombre || !dni) return alert("Completá los datos");
        
        alert("✅ Datos enviados a revisión en RICHARDBRO. Ya podés operar.");
        window.location.href = "/";
    }
</script>

</body>
</html>
