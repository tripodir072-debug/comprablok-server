<script>
    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(){
                const output = document.getElementById('preview');
                const text = document.getElementById('upload-text');
                output.src = reader.result;
                output.style.display = 'block';
                text.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    }

    function enviarRegistro() {
        const nombre = document.getElementById('nombre').value;
        const dni = document.getElementById('dni').value;
        const foto = document.getElementById('fotoFile').files[0];

        if(!nombre || !dni || !foto) {
            return alert("Por favor, completa todos los datos y sube la foto de tu DNI.");
        }
        
        // --- LA MEJORA CRÍTICA ---
        // 1. Guardamos que el usuario ya está validado
        localStorage.setItem('dni_verificado', 'true');
        
        // 2. Guardamos su nombre para usarlo en los links de venta
        localStorage.setItem('vendedor_actual', nombre);

        // Mensaje de éxito y redirección
        alert("✅ Identidad enviada al sistema de TRATO. Tu cuenta ahora tiene respaldo legal y puedes operar.");
        window.location.href = "/";
    }
</script>
