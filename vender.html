<script>
    // --- LÓGICA DE ID ---
    const urlParams = new URLSearchParams(window.location.search);
    const idDelTrato = urlParams.get('trato_id') || localStorage.getItem('ultimo_id_generado') || "TR-PENDIENTE";
    document.getElementById('id-visible').innerText = idDelTrato;

    // --- CANDADO DE SEGURIDAD REFORZADO ---
    if (localStorage.getItem('dni_verificado') !== 'true') {
        alert("🔒 Acceso Denegado: Debes validar tu identidad para crear ventas.");
        window.location.href = "/registro.html";
    }

    async function generarLink() {
        const btnGenerar = document.querySelector('button');
        const divResultado = document.getElementById('resultado-pago');

        try {
            const vendedorLogueado = localStorage.getItem('vendedor_actual') || "Vendedor Richard Bro";
            const titulo = document.getElementById('p').value;
            const precio = document.getElementById('m').value;

            if(!titulo || !precio) {
                alert("Por favor, completa los campos.");
                return;
            }

            btnGenerar.innerText = "⏳ GENERANDO LINK...";
            btnGenerar.disabled = true;

            // Enviamos los datos al servidor de Render
            const response = await fetch('/create_preference', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    title: titulo, 
                    price: parseFloat(precio), 
                    vendedor: vendedorLogueado,
                    external_reference: idDelTrato // <--- Mercado Pago usa este nombre para el ID
                })
            });
            
            const data = await response.json();

            if (data.init_point) {
                const linkFinal = data.init_point;
                // Mensaje de WhatsApp bien vendedor y profesional
                const textoWA = `🛡️ PAGO SEGURO - TRATO\n\nHola! Te envío el link de pago protegido para: *${titulo}*.\n\n✅ Operación: ${idDelTrato}\n✅ Monto: $${precio}\n\nLink de pago: ${linkFinal}\n\n*La plata queda en custodia de RICHARD BRO hasta que recibas el producto.*`;
                const urlWA = "https://wa.me/?text=" + encodeURIComponent(textoWA);

                divResultado.innerHTML = `
                    <div style="background: #e7f3ff; padding: 15px; border-radius: 8px; margin-top: 20px; border-left: 5px solid #1877F2; text-align: center;">
                        <p style="color: #1c1e21; font-weight: bold; font-size: 13px; margin-bottom: 12px;">🛡️ LINK DE CUSTODIA GENERADO</p>
                        <a href="${urlWA}" target="_blank" style="background: #25D366; color: white; text-decoration: none; padding: 12px; display: block; border-radius: 6px; font-weight: bold; font-size: 14px; margin-bottom: 10px;">ENVIAR POR WHATSAPP 📱</a>
                        <button onclick="copiarLink('${linkFinal}')" style="background: #1877F2; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px;">COPIAR LINK MANUAL 📋</button>
                    </div>
                `;
            } else {
                alert("Error al generar preferencia.");
            }
        } catch (error) {
            alert("Error en el servidor de Render.");
        } finally {
            btnGenerar.innerText = "GENERAR LINK PROTEGIDO";
            btnGenerar.disabled = false;
        }
    }

    function copiarLink(url) {
        navigator.clipboard.writeText(url).then(() => {
            alert("✅ Link copiado al portapapeles");
        });
    }
</script>
