<script>
    async function generarLink() {
        const vendedorLogueado = localStorage.getItem('vendedor_actual') || "Invitado";
        const titulo = document.getElementById('p').value;
        const precio = document.getElementById('m').value;

        if(!titulo || !precio) {
            alert("Por favor, completa los campos.");
            return;
        }

        try {
            const response = await fetch('/create_preference', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    title: titulo, 
                    price: precio,
                    vendedor: vendedorLogueado
                })
            });
            
            const data = await response.json();

            if (data.init_point) {
                const contenedor = document.getElementById('resultado-pago'); 
                const linkFinal = data.init_point;
                const textoWA = encodeURIComponent(`Hola! Te paso el link de pago protegido por TRATO para "${titulo}". El dinero queda en custodia hasta que reciba el producto: ${linkFinal}`);

                // Solo agregamos los botones de compartir y copiar
                contenedor.innerHTML = `
                    <div style="background: #e7f3ff; padding: 15px; border-radius: 8px; margin-top: 20px; border-left: 5px solid #1877F2; text-align: center;">
                        <p style="color: #1c1e21; font-weight: bold; font-size: 13px; margin-bottom: 12px;">🛡️ LINK DE CUSTODIA GENERADO</p>
                        
                        <a href="https://wa.me/?text=${textoWA}" target="_blank" style="background: #25D366; color: white; text-decoration: none; padding: 12px; display: block; border-radius: 6px; font-weight: bold; font-size: 14px; margin-bottom: 10px;">
                            COMPARTIR POR WHATSAPP 📱
                        </a>

                        <button onclick="copiarLink('${linkFinal}')" style="background: #1877F2; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px;">
                            COPIAR LINK MANUAL 📋
                        </button>
                    </div>
                `;
            } else {
                alert("Error al conectar con Mercado Pago.");
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Error en el servidor.");
        }
    }

    // Función extra para que el botón de copiar funcione
    function copiarLink(url) {
        navigator.clipboard.writeText(url).then(() => {
            alert("✅ Link copiado al portapapeles");
        });
    }
</script>
