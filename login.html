<script>
    function entrar() {
        const inputUser = document.getElementById('user');
        const usuario = inputUser.value.trim();
        
        if(usuario !== "") {
            // 1. Guardamos el nombre del vendedor con prioridad
            localStorage.setItem('vendedor_actual', usuario);
            
            // 2. Buscamos si ya está validado
            const validado = localStorage.getItem('dni_verificado');
            
            // 3. Pequeño feedback visual en el botón para que el usuario sepa que algo pasa
            const btn = document.querySelector('button');
            btn.innerText = "VERIFICANDO...";
            btn.style.opacity = "0.7";
            btn.disabled = true;

            // 4. Tiempo de espera para que la memoria del celu procese el guardado
            setTimeout(() => {
                if(validado === 'true') {
                    window.location.href = "index.html";
                } else {
                    window.location.href = "registro.html";
                }
            }, 500); 

        } else {
            alert("Por favor, ingresá tu nombre para continuar.");
            inputUser.focus();
        }
    }

    // Permitir entrar tocando "Enter" en el teclado
    document.getElementById('user').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            entrar();
        }
    });
</script>
