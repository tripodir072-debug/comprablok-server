<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RICHARDBRO</title>
    <style>
        body { font-family: sans-serif; background: #0b0e11; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e2329; padding: 30px; border-radius: 15px; width: 320px; text-align: center; border: 1px solid #474d57; }
        h2 { color: #f0b90b; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #474d57; background: #2b3139; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #f0b90b; color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>RICHARDBRO</h2>
        <p>Iniciá sesión para controlar tus ventas</p>
        <input type="text" id="user" placeholder="Tu Nombre o Usuario">
        <button onclick="entrar()">INGRESAR</button>
    </div>

    <script>
        function entrar() {
            const usuario = document.getElementById('user').value;
            if(usuario.trim() !== "") {
                // Esto guarda quién sos en el celu para que no se borre
                localStorage.setItem('vendedor_actual', usuario);
                window.location.href = "/index.html";
            } else {
                alert("Poné un nombre para continuar");
            }
        }
    </script>
</body>
</html>
